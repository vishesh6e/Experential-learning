<!DOCTYPE html>
<html lang="en">

<head>
    <title>Simple Chem Lab</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Top Header -->
    <header>
        <h1>⚗️ Virtual Lab</h1>
    </header>

    <main>
        <!-- Left Panel (Chemicals to drag) -->
        <div class="panel">
            <h2>Chemicals</h2>

            <div class="item" draggable="true">
                <span class="icon">🔴</span>
                <div class="name">
                    <strong>HCl</strong>
                    <br>
                    <small>Acid</small>
                </div>
                <span class="tag red">Danger</span>
            </div>

            <div class="item" draggable="true">
                <span class="icon">🔵</span>
                <div class="name">
                    <strong>NaOH</strong>
                    <br>
                    <small>Base</small>
                </div>
                <span class="tag red">Danger</span>
            </div>

            <div class="item" draggable="true">
                <span class="icon">⚪</span>
                <div class="name">
                    <strong>NaCl</strong>
                    <br>
                    <small>Salt</small>
                </div>
                <span class="tag green">Safe</span>
            </div>
        </div>

        <!-- Right Workspace (Places to drop) -->
        <div class="workspace">
            <div class="zones">
                <div class="drop-zone">
                    <span class="big-icon">🧪</span>
                    <p>Mixing Beaker</p>
                </div>

                <div class="drop-zone">
                    <span class="big-icon">🔥</span>
                    <p>Heating Station</p>
                </div>

                <div class="drop-zone">
                    <span class="big-icon">🔬</span>
                    <p>Microscope</p>
                </div>

                <div class="drop-zone">
                    <span class="big-icon">🗑️</span>
                    <p>Waste Bin</p>
                </div>
            </div>

            <!-- Log at the bottom -->
            <div class="log">
                <p>Ready. Drag items to stations.</p>
            </div>
        </div>
    </main>

</body>

</html>
